name: Test Pascal Program - String to Linked List

on:
  push:
    branches: [ "feature/string-to-linked-list" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog

      - name: Compile Pascal Program
        run: |
          swipl -s pascal_compiler.pl -g "compile('examples/lists/string_to_linked_list.pas')." --quiet

      - name: Run Compiled Program
        run: |
          # Replace with the actual command to run the compiled output
          # Example: if the compiler generates an executable named 'string_to_linked_list'
          ./string_to_linked_list