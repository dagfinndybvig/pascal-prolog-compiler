name: Test Pascal Program - Linked Lists

on:
  push:
    branches: [ "main", "feature/string-to-linked-list" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pascal-prolog-compiler:1.16.1 .

      - name: Compile Pascal Program
        run: |
          ./scripts/pascalc-docker.sh build-asm examples/lists/string_to_linked_list.pas string_to_linked_list
          ./scripts/pascalc-docker.sh build-asm examples/lists/nested_s_expression_list.pas nested_s_expression_list

      - name: Run Compiled Program
        run: |
          output="$(printf '(a b c)\n' | ./string_to_linked_list)"
          test "$output" = "list: [a] -> [b] -> [c] -> nil"
          output="$(printf '(a (b c) d)\n' | ./nested_s_expression_list)"
          test "$output" = "tree: [a] -> ([b] -> [c] -> nil) -> [d] -> nil"
