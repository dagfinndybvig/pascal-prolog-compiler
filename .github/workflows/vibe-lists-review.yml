name: Vibe Lists Review

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Mistral Vibe
        run: pip install mistral-vibe

      - name: Debug - List files in examples/lists
        run: ls -la examples/lists/ || echo "Directory does not exist or is empty"

      - name: Run Mistral Vibe on examples/lists
        run: |
          export MISTRAL_API_KEY="${{ secrets.MISTRAL_API_KEY }}"
          # Test API key (optional)
          if [ -z "$MISTRAL_API_KEY" ]; then
            echo "Error: MISTRAL_API_KEY is not set!"
            exit 1
          fi
          # Run Vibe with a simpler prompt
          vibe --model mistral-pro --repo . "Analyze all Pascal programs in examples/lists. Enumerate the Pascal subset used (data types, control structures, procedures, I/O, advanced features). Output a markdown report." > examples/lists/pascal-subset-report.md 2>&1 || {
            echo "Vibe command failed. Check the error above."
            exit 1
          }
          # Add metadata
          echo "" >> examples/lists/pascal-subset-report.md
          echo "---" >> examples/lists/pascal-subset-report.md
          echo "Report generated at: $(date)" >> examples/lists/pascal-subset-report.md
          echo "Commit SHA: ${{ github.sha }}" >> examples/lists/pascal-subset-report.md
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Commit and push the report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add examples/lists/pascal-subset-report.md
          git diff --cached --quiet || git commit -m "Add Pascal subset report for examples/lists (generated by Mistral Vibe)"
          git push
