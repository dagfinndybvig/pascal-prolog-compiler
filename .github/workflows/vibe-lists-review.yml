name: Vibe Lists Review

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
      - '!examples/lists/pascal-subset-report.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
      - '!examples/lists/pascal-subset-report.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Mistral Vibe
        run: |
          python -m pip install --upgrade pip
          python -m pip install mistral-vibe

      - name: Debug - List files in examples/lists
        run: ls -la examples/lists/ || echo "Directory does not exist or is empty"

      - name: Run Mistral Vibe on examples/lists
        run: |
          set -o pipefail
          export MISTRAL_API_KEY="${{ secrets.MISTRAL_API_KEY }}"
          if [ -z "$MISTRAL_API_KEY" ]; then
            echo "MISTRAL_API_KEY is not set; skipping Vibe report generation."
            exit 0
          fi
          vibe --workdir . --trust --max-turns 1 --max-price 1.00 -p "Analyze all Pascal programs in examples/lists. Enumerate the Pascal subset used (data types, control structures, procedures, I/O, advanced features). Output a markdown report." 2>&1 | tee examples/lists/pascal-subset-report.md
          # Add metadata
          echo "" >> examples/lists/pascal-subset-report.md
          echo "---" >> examples/lists/pascal-subset-report.md
          echo "Report generated at: $(date)" >> examples/lists/pascal-subset-report.md
          echo "Commit SHA: ${{ github.sha }}" >> examples/lists/pascal-subset-report.md
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Commit and push the report
        if: github.event_name != 'pull_request'
        run: |
          if [ ! -f examples/lists/pascal-subset-report.md ]; then
            echo "No report was generated; nothing to commit."
            exit 0
          fi
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add examples/lists/pascal-subset-report.md
          git diff --cached --quiet || git commit -m "Add Pascal subset report for examples/lists (generated by Mistral Vibe) [skip ci]"
          git push
