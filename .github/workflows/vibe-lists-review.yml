name: Vibe Lists Review

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'examples/lists/**'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Mistral Vibe
        run: pip install mistral-vibe

      - name: Run Mistral Vibe on examples/lists
        run: |
          export MISTRAL_API_KEY="${{ secrets.MISTRAL_API_KEY }}"
          vibe --model mistral-pro --repo . "Analyze all Pascal programs in the examples/lists folder. Enumerate the Pascal subset used by these programs, including:
          - Data types (e.g., integers, arrays, records).
          - Control structures (e.g., if/then/else, while, for, case).
          - Procedures and functions.
          - Input/Output operations.
          - Any unique or advanced features (e.g., pointers, recursion).
          Output a detailed markdown report with examples from the code." > examples/lists/pascal-subset-report.md

          echo "" >> examples/lists/pascal-subset-report.md
          echo "---" >> examples/lists/pascal-subset-report.md
          echo "Report generated at: $(date)" >> examples/lists/pascal-subset-report.md
          echo "Commit SHA: ${{ github.sha }}" >> examples/lists/pascal-subset-report.md
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Commit and push the report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add examples/lists/pascal-subset-report.md
          git commit -m "Add Pascal subset report for examples/lists (generated by Mistral Vibe)"
          git push